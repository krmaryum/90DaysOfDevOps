apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
spec:
  restartPolicy: Never
  containers:
    - name: oom-demo
      image: python:3.12-alpine
      command: ["python3", "-c"]
      args:
        - |
          x = []
          while True:
              x.append("A" * 1024 * 1024)
      resources:
        requests:
          memory: "50Mi"
        limits:
          memory: "100Mi"
