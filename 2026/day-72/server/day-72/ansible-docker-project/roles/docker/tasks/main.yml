---
#SPDX-License-Identifier: MIT-0
# tasks file for roles/docker

- name: Install Docker dependencies on Debian/RedHat
  package:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
      - python3-docker
    state: present
  tags: docker

- name: Update apt cache for Debian
  apt:
    update_cache: true
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"
  tags: docker

#- name: Update yum cache for RedHat
#  yum:
#    update_cache: true
#  when: ansible_facts['os_family'] == "RedHat"
#  tags: docker

- name: Update yum cache for RedHat
  yum:
    name: "*"
    state: latest
    update_only: true
  changed_when: false
  when: ansible_facts['os_family'] == "RedHat"
  tags: docker

- name: Install Docker for Debian/RedHat
  package:
    name: "{{ docker_package[ansible_facts['os_family']] }}"
    state: present
  tags: docker

- name: Start and enable Docker service
  service:
    name: docker
    state: started
    enabled: true
  tags: docker

- name: Add deploy user to docker group
  user:
    name: deploy
    groups: docker
    append: true
  notify: Restart Docker
  tags: docker

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ vault_docker_username }}"
    password: "{{ vault_docker_password }}"
  #become_user: deploy
  when:
    - vault_docker_username is defined
    - vault_docker_password is defined
  tags: docker

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_app_image }}"
    tag: "{{ docker_app_tag }}"
    source: pull
  tags: docker

- name: Install Docker Compose
  package:
    name: "{{ docker_compose_package[ansible_facts['os_family']] }}"
    state: present
  tags: docker

- name: Create application directory
  file:
    path: /opt/app
    state: directory
    mode: '0755'
  tags: docker

- name: Create custom index page
  copy:
    dest: /opt/app/index.html
    content: |
      <h1>Hello from DevOps Project</h1>
    mode: '0644'
  tags: docker


- name: Find existing container using app port
  shell: "docker ps -q --filter publish={{ docker_app_port }}"
  register: existing_app_container
  changed_when: false
  tags: docker

- name: Remove existing container using app port
  community.docker.docker_container:
    name: "{{ existing_app_container.stdout }}"
    state: absent
    force_kill: true
  when: existing_app_container.stdout != ""
  tags: docker


- name: Run application container
  community.docker.docker_container:
    name: "{{ docker_app_name }}"
    image: "{{ docker_app_image }}:{{ docker_app_tag }}"
    state: started
    restart_policy: always
    published_ports:
      - "{{ docker_app_port }}:{{ docker_container_port }}"  # host_port(8080):container_port(80)
    volumes:
      - /opt/app/index.html:/usr/share/nginx/html/index.html
  tags: docker

- name: Wait for container to be healthy
  uri:
    url: "http://localhost:{{ docker_app_port }}"
    status_code: 200
  retries: 5
  delay: 3
  register: health_check
  until: health_check.status == 200
  tags: docker



