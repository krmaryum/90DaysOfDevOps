apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
spec:
  containers:
    - name: busybox
      image: busybox:latest
      command: ["sh", "-c", "echo DB_USER=$DB_USER && sleep 3600"]
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
      volumeMounts:
        - name: db-secret-volume
          mountPath: /etc/db-credentials
          readOnly: true
  volumes:
    - name: db-secret-volume
      secret:
        secretName: db-credentials
  restartPolicy: Never
