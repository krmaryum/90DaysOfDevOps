---
- name: Multi pkgs install
  hosts: all_servers
  become: true

  tasks:
    - name: Install Multi packages
      apt:  # apt(name=[git, curl, wget], state=present)   ✅  , apt([git, curl, wget])   ❌
        name:
          - git
          - tree
          - wget
        state: present
      when: ansible_facts['os_family'] == "RedHat"
