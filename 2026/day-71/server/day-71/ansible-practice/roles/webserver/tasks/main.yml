---
# tasks file for roles/webserver

- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Create web root # Yahan tumhari actual website hoti hai
  file:
    path: "/var/www/{{ app_name }}"  # index.html → /var/www/terraweek/index.html
    state: directory
    mode: '0755'

- name: Deploy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    mode: '0644'
  notify: Restart Nginx

- name: Deploy vhost config       # Is folder me har file = ek website, Jab request aaye → iss folder se files serve karo
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/conf.d/{{ app_name }}.conf"
    owner: root
    mode: '0644'
  notify: Restart Nginx

- name: Deploy index page        # Yahan tumhari actual website hoti hai, 
  template:
    src: index.html.j2
    dest: "/var/www/{{ app_name }}/index.html"
    mode: "0644"

- name: start and enable Nginx
  service:
    name: nginx
    state: started
    enabled: true



