---
- name: Configure web servers
  hosts: ubuntu_web
  become: true
  roles:
    - role: webserver
      vars:
        app_name: terraweek
        http_port: 80

- name: Configure app servers with Docker
  hosts: redhat_app
  become: true
  roles:
    - geerlingguy.docker

- name: Configure database servers
  hosts: amz_db
  become: true
  gather_facts: true

  tasks:
    - name: Create DB config with secrets
      template:
        src: db-config.j2
        dest: /etc/db-config.env
        owner: root
        group: root
        mode: '0600'
